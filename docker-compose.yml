version: '3.8'

services:
  noodlebox-ai-waiter:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AUTOADDRESS_API_KEY=${AUTOADDRESS_API_KEY}
      - TRANSFER_PHONE_NUMBER=${TRANSFER_PHONE_NUMBER}
    
    restart: unless-stopped
    command: sh -c "uvicorn server:app --host 0.0.0.0 --port 5000 --reload"
